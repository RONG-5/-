<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品识别网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .info {
            font-size: 1.2rem;
            color: #34495e;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        .input-group {
            display: flex;
            margin-bottom: 20px;
        }

        #itemInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #3498db;
            border-radius: 8px 0 0 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #itemInput:focus {
            border-color: #2980b9;
        }

        #searchBtn {
            padding: 12px 25px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #searchBtn:hover {
            background-color: #2980b9;
        }

        #imageContainer {
            text-align: center;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed #bdc3c7;
            border-radius: 10px;
            background-color: #ecf0f1;
        }

        #itemImage {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            display: none;
        }

        #placeholderText {
            color: #7f8c8d;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>物品识别网页</h1>
        <div class="info">
            班级：计科讯飞（5）班 | 学号：2409060531 | 姓名：全泳涛
        </div>
    </div>

    <div class="container">
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="请输入水果、动物或物品名称（中文/英文）">
            <button id="searchBtn">显示图片</button>
        </div>
        <div id="imageContainer">
            <img id="itemImage" alt="物品图片">
            <div id="placeholderText">请输入名称并点击按钮查看图片</div>
        </div>
    </div>

    <script>
        const itemInput = document.getElementById('itemInput');
        const searchBtn = document.getElementById('searchBtn');
        const itemImage = document.getElementById('itemImage');
        const placeholderText = document.getElementById('placeholderText');
        const imageContainer = document.getElementById('imageContainer');

        searchBtn.addEventListener('click', () => {
            const itemName = itemInput.value.trim();
            if (itemName) {
                // 使用 LoremFlickr API 获取图片
                const imageUrl = `https://loremflickr.com/400/300/${encodeURIComponent(itemName)}`;
                
                itemImage.src = imageUrl;
                itemImage.style.display = 'block';
                placeholderText.style.display = 'none';

                // 处理图片加载失败的情况
                itemImage.onerror = () => {
                    itemImage.style.display = 'none';
                    placeholderText.style.display = 'block';
                    placeholderText.textContent = `未找到“${itemName}”的图片，请尝试其他名称`;
                };
            } else {
                alert('请输入物品名称！');
            }
        });

        // 支持回车键搜索
        itemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchBtn.click();
            }
        });
    </script>
</body>
</html>
